<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { cursor: none !important; }

#px-cursor {
  position: fixed; width: 16px; height: 16px;
  pointer-events: none; z-index: 99999;
  image-rendering: pixelated;
  transform: translate(-2px, -2px);
}

body {
  background: #fdf0f8;
  font-family: 'DotGothic16', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
  color: #3d1a4a;
  user-select: none; -webkit-user-select: none; -webkit-user-drag: none;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(200,160,255,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,160,255,0.07) 1px, transparent 1px);
  background-size: 16px 16px;
  pointer-events: none; z-index: 0;
}

html { scrollbar-gutter: stable; }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: #f5e0ff; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #c9a8ff, #ffb3d6);
  border: 2px solid #f5e0ff;
}
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #b78cff, #ff96c8); }

header {
  position: relative; z-index: 10;
  background: #f9d6f0;
  border-bottom: 4px solid #c9a8ff;
  box-shadow: 0 4px 0 #e8b8ff, 0 8px 0 #f0d0ff;
  overflow: hidden;
}
.header-titlebar {
  background: linear-gradient(90deg, #c9a8ff 0%, #ffb3d6 100%);
  padding: 4px 10px;
  display: flex; align-items: center; justify-content: space-between;
  min-height: 28px;
}
.titlebar-title {
  font-family: 'DotGothic16', sans-serif; font-size: 12px;
  color: #fff;
  text-shadow: 2px 2px 0 #b078d8;
  letter-spacing: 1px;
}
.titlebar-btns { display: flex; gap: 4px; }
.titlebar-btns span {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.6);
}

#sprite-track {
  position: relative; height: 36px; overflow: hidden;
  background: rgba(255,255,255,0.25);
  border-top: 2px dashed rgba(200,150,255,0.35);
  border-bottom: 2px dashed rgba(200,150,255,0.35);
}
.sprite-char {
  position: absolute; bottom: 2px;
  image-rendering: pixelated;
  line-height: 1;
}
.sprite-char svg { display: block; image-rendering: pixelated; }

.header-main {
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.header-left { display: flex; align-items: center; gap: 10px; }

header h1 {
  font-family: 'DotGothic16', sans-serif; font-size: 15px;
  letter-spacing: 2px; color: #8844cc;
  text-decoration: none;
  text-shadow: 2px 2px 0 #f0b8ff;
  transition: color 0.2s;
}
header h1:hover { color: #cc44aa; }

.dots {
  font-size: 13px; color: #d090f0; letter-spacing: 2px;
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.controls {
  display: flex; gap: 6px; align-items: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.header-left:hover .controls {
  opacity: 1; pointer-events: auto;
}
.controls button {
  font-family: 'DotGothic16', sans-serif; font-size: 11px;
  padding: 4px 12px; border: none;
  background: #e8c8ff; color: #6633aa; cursor: none;
  letter-spacing: 1px;
  box-shadow: 3px 3px 0 #b888dd, inset 0 0 0 2px #d4a8f8;
  transition: all 0.1s;
}
.controls button:hover {
  background: #d4a8f8;
  box-shadow: 2px 2px 0 #b888dd;
  transform: translate(1px,1px);
}
.controls button.active {
  background: #c9a8ff; color: #fff;
  box-shadow: 2px 2px 0 #8855cc;
  text-shadow: 1px 1px 0 #8855cc;
}
.x-link { display:flex; align-items:center; opacity:.45; transition:opacity .2s; text-decoration:none; }
.x-link:hover { opacity:.9; }
.x-icon { width:14px; height:14px; fill:#8844cc; }

.heart-btn {
  display: flex; align-items: center;
  padding: 4px 10px;
  border: none;
  background: #e8c8ff; cursor: none;
  box-shadow: 3px 3px 0 #b888dd, inset 0 0 0 2px #d4a8f8;
  transition: all 0.1s;
  overflow: hidden;
  min-width: 36px;
  justify-content: center;
}
.heart-btn:hover {
  background: #ffd6ee;
  box-shadow: 2px 2px 0 #b888dd;
  transform: translate(1px,1px);
}
.heart-btn:active { box-shadow: 1px 1px 0 #b888dd; transform: translate(2px,2px); }
.heart-default { display: flex; align-items: center; gap: 0; animation: dotPulse 2s ease-in-out infinite; }
.heart-hover   { display: none; align-items: center; gap: 3px; }
.heart-btn:hover .heart-default { display: none; }
.heart-btn:hover .heart-hover   { display: flex; }
#count {
  font-family:'DotGothic16',sans-serif; font-size:11px;
  color:#b888dd; background:rgba(200,160,255,0.18);
  padding:2px 8px; border:2px solid #e0b8ff; letter-spacing:1px;
}

.float-sprite {
  position: fixed; pointer-events: none; z-index: 5;
  image-rendering: pixelated;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(0)    rotate(0deg);   opacity: .7; }
  50%  { transform: translateY(-14px) rotate(10deg);  opacity: 1;  }
  100% { transform: translateY(0)    rotate(0deg);   opacity: .7; }
}

#grid-wrap { position:relative; z-index:2; }
#grid { position:relative; margin-bottom:80px; }

.cell {
  position:absolute; width:270px; cursor:none;
  background:#e8c8ff;
  border:3px solid #c9a8ff;
  box-shadow:4px 4px 0 #b888dd, 4px 4px 0 2px #f0d8ff;
  overflow:hidden;
  transition:transform .12s, box-shadow .12s;
  will-change:transform;
}
.cell img {
  display:block; width:100%; height:auto;
  transition:filter .3s;
  -webkit-user-drag:none; pointer-events:none;
}
.cell:hover {
  transform:translate(-2px,-2px);
  box-shadow:6px 6px 0 #b888dd, 6px 6px 0 2px #f0d8ff;
  z-index:3; overflow:visible;
}
.cell::after { display:none; }
.cell:hover img { filter:saturate(1.15) brightness(1.04); }

.cell .info {
  position:absolute; bottom:0; left:0; right:0;
  padding:18px 6px 5px;
  background:linear-gradient(transparent,rgba(100,50,160,.7));
  opacity:0; transform:translateY(4px);
  transition:opacity .2s, transform .2s;
  display:flex; flex-direction:column; gap:2px;
}
.cell:hover .info { opacity:1; transform:translateY(0); }
.info .date {
  font-family:'DotGothic16',sans-serif; font-size:10px;
  color:rgba(255,220,255,.95);
  text-shadow:1px 1px 0 rgba(0,0,0,.8); letter-spacing:1px;
}

footer {
  position:relative; z-index:2;
  text-align:center; padding:20px 0 40px;
  font-family:'DotGothic16',sans-serif;
  font-size:11px; color:#d4a8f0; letter-spacing:2px;
}
</style>
