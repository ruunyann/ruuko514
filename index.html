function makeSpriteEl(defId, size) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 16 16');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.style.imageRendering = 'pixelated';
  const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
  use.setAttribute('href', '#' + defId);
  svg.appendChild(use);
  return svg;
}

const BURST_IDS = ['sp-star','sp-heart','sp-sparkle','sp-diamond','sp-flower','sp-moon'];

function spawnHearts(x, y) {
  const count = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const defId = BURST_IDS[Math.floor(Math.random() * BURST_IDS.length)];
    const size  = 14 + Math.floor(Math.random() * 12);
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
    const dist  = 55 + Math.random() * 75;
    const dur   = 550 + Math.random() * 400;

    const wrap = document.createElement('div');
    wrap.style.cssText = `
      position:fixed; left:${x}px; top:${y}px;
      pointer-events:none; z-index:9999;
      transform:translate(-50%,-50%);
      transition:transform ${dur}ms cubic-bezier(0.2,1,0.4,1), opacity ${dur}ms ease;
      opacity:1; image-rendering:pixelated;
    `;
    wrap.appendChild(makeSpriteEl(defId, size));
    document.body.appendChild(wrap);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      wrap.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0.15)`;
      wrap.style.opacity = '0';
    }));
    setTimeout(() => wrap.remove(), dur + 60);
  }
}

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('mousedown', e => {
  if (e.button !== 0 && e.button !== 2) return;
  spawnHearts(e.clientX, e.clientY);
});

function parseJpDate(str) {
  const s = str.replace(/[+＋]/g, '');
  const m = s.match(/(\d{4})年(?:(\d{1,2})月(?:(\d{1,2})日)?)?/);
  if (!m) return 0;
  return parseInt(m[1])*10000 + (m[2]?parseInt(m[2]):1)*100 + (m[3]?parseInt(m[3]):1);
}

const _DEC={"-":"3", "0":"f", "1":"w", "2":"o", "3":"d", "4":"7", "5":"q", "6":"F", "7":"r", "8":"v", "9":"B", "A":"8", "B":"Z", "C":"e", "D":"-", "E":"5", "F":"J", "G":"1", "H":"V", "I":"A", "J":"y", "K":"2", "L":"R", "M":"C", "N":"W", "O":"N", "P":"E", "Q":"0", "R":"i", "S":"H", "T":"D", "U":"h", "V":"S", "W":"Y", "X":"Q", "Y":"l", "Z":"G", "_":"k", "a":"U", "b":"X", "c":"L", "d":"n", "e":"c", "f":"I", "g":"s", "h":"_", "i":"z", "j":"p", "k":"6", "l":"x", "m":"9", "n":"g", "o":"a", "p":"u", "q":"P", "r":"T", "s":"O", "t":"m", "u":"4", "v":"M", "w":"j", "x":"b", "y":"K", "z":"t"};
const decId = s => s ? s.split('').map(c => _DEC[c]??c).join('') : s;

const TWIMG_G = id => `https://pbs.twimg.com/media/${decId(id)}.jpg`;

  date:  o.d  ? o.d.replace(/^(\d{4})-(\d{1,2})(?:-(\d{1,2}))?$/, (_,y,m,d) =>
           `${y}年${m}月${d||'xx'}日`) : '2026年x月xx日',
}));

items.forEach(item => { item.ts = parseJpDate(item.date); });

const GAP = 6, COL_W = 180;
const SPEED = 0.6;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const imgCache = {};
function preloadAll(pool) {
  return Promise.all(pool.map(item => new Promise(resolve => {
    if (imgCache[item.url]) { resolve(); return; }
    const img = new Image();
    img.onload  = () => { imgCache[item.url] = { w: img.naturalWidth, h: img.naturalHeight }; resolve(); };
    img.onerror = () => { imgCache[item.url] = { w: 3, h: 4 }; resolve(); };
    img.src = item.url;
  })));
}

let scrollY = 0;
let rafId = null;
let cols = 2, colW = 200;
let colH = [];
let cellEls = [];
let deck = [];

function nextItem() {
  if (deck.length === 0) deck = shuffle(items);
  return deck.shift();
}

function initColumns() {
  cols = Math.max(2, Math.floor(window.innerWidth / (COL_W + GAP)));
  colW = Math.floor((window.innerWidth - GAP * (cols + 1)) / cols);
  colH = new Array(cols).fill(GAP);
}

function appendItem(item) {
  const grid = document.getElementById('kawaii-4058');
  const cached = imgCache[item.url] || { w: 3, h: 4 };
  const isLandscape = cached.w > cached.h;
  const span = (isLandscape && cols >= 2) ? 2 : 1;
  const cellW = span === 2 ? colW * 2 + GAP : colW;
  const realH = Math.round(cached.h * cellW / cached.w);

  const cell = document.createElement('div');
  cell.className = 'ww-2312';
  cell.style.cssText = `position:absolute;width:${cellW}px;height:${realH}px;`;

  if (item.tweet) cell.dataset.tweet = item.tweet;

  const img = document.createElement('img');
  img.src = item.url;
  img.draggable = false;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  cell.appendChild(img);

  let col = 0;
  if (span === 2) {
    let best = Infinity;
    for (let c = 0; c <= cols - 2; c++) {
      const t = Math.max(colH[c], colH[c + 1]);
      if (t < best) { best = t; col = c; }
    }
  } else {
    col = colH.indexOf(Math.min(...colH));
  }

  const x = GAP + col * (colW + GAP);
  const y = span === 2 ? Math.max(colH[col], colH[col + 1]) : colH[col];
  cell.style.left = x + 'px';
  cell.style.top  = y + 'px';

  if (span === 2) {
    colH[col] = colH[col + 1] = y + realH + GAP;
  } else {
    colH[col] = y + realH + GAP;
  }

  grid.appendChild(cell);
  cellEls.push({ el: cell, bottom: y + realH });
  grid.style.height = Math.max(...colH) + 'px';
}

function fillAhead() {
  const viewBottom = scrollY + window.innerHeight * 3;
  while (Math.min(...colH) < viewBottom) appendItem(nextItem());
}

function pruneAbove() {
  const cutoff = scrollY - window.innerHeight * 2;
  cellEls = cellEls.filter(({ el, bottom }) => {
    if (bottom < cutoff) { el.remove(); return false; }
    return true;
  });
}

function startScroll() {
  const scrollEl = document.getElementById('kawaii-1373');
  const headerH  = document.querySelector('header').offsetHeight;
  function tick() {
    scrollY += SPEED;
    fillAhead();
    pruneAbove();
    scrollEl.style.transform = `translateY(${headerH - scrollY}px)`;
    rafId = requestAnimationFrame(tick);
  }
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(tick);
}

let _mouseDownX = 0, _mouseDownY = 0, _didDrag = false;
document.addEventListener('mousedown', e => {
  _mouseDownX = e.clientX;

document.addEventListener('mousemove', e => {

});

      } catch(e) {}

      // inject context menu for ngsfi cards
      if (key === 'ngsfi') {
        try {
          const iw = iframe.contentWindow;
          const idoc = iframe.contentDocument || iw.document;

          // context menu element
          const menu = idoc.createElement('div');
          menu.id = '_nyann_ctx';
          menu.style.cssText = [
            'position:fixed;z-index:99999;min-width:200px',
            'background:#1a2540;border:2px solid #4f7eff',
            'box-shadow:4px 4px 0 #3058cc',
            'font-family:"DotGothic16",sans-serif;font-size:12px',
            'display:none;flex-direction:column;gap:0',
            'user-select:none'
          ].join(';');

          const mkItem = (label, icon) => {
            const b = idoc.createElement('button');
            b.style.cssText = [
              'display:flex;align-items:center;gap:8px',
              'padding:9px 14px;border:none',
              'background:transparent;color:#c8deff',
              'font-family:inherit;font-size:12px',
              'cursor:pointer;text-align:left;width:100%',
              'transition:background .1s'
            ].join(';');
            b.onmouseover = () => b.style.background = 'rgba(79,126,255,0.18)';
            b.onmouseout  = () => b.style.background = 'transparent';
            b.innerHTML = icon + label;
            return b;
          };

          const X_ICON = '<svg width="13" height="13" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><path d="M178.57 127.15 290.27 0h-26.46l-97.03 110.38L89.34 0H0l117.13 166.93L0 300.25h26.46l102.4-116.59 81.8 116.59h89.34M36.01 19.54H76.66l187.13 262.13h-40.66" fill="#8fa8ff"/></svg>';
          const LINK_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8fa8ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

          const btnX    = mkItem(' X (Twitter) で開く', X_ICON);
          const btnFash = mkItem(' pso2.jp で開く', LINK_ICON);
          const div = idoc.createElement('div');
          div.style.cssText = 'height:1px;background:rgba(79,126,255,0.3);margin:2px 0';
          menu.appendChild(btnFash);
          menu.appendChild(div);
          menu.appendChild(btnX);
          idoc.body.appendChild(menu);

          let _ctxData = {};

          function hideMenu() { menu.style.display = 'none'; _ctxData = {}; }

          idoc.addEventListener('contextmenu', e => {
            const card = e.target.closest && e.target.closest('.card');
            if (!card) return;
            e.preventDefault();
            e.stopPropagation();

            // extract tweetId and fashionUrl from card's onclick and action links
            const oc = card.getAttribute('onclick') || '';
            const mFash = oc.match(/window\.open\(['"]([^'"]+)['"]/);
            _ctxData.fashionUrl = mFash ? mFash[1] : null;

            const aX = card.querySelector('a.btn-tw, a.btn[href*="x.com"]');
            _ctxData.tweetUrl = aX ? aX.getAttribute('href') : null;

            btnFash.style.display = _ctxData.fashionUrl ? '' : 'none';
            btnX.style.display    = _ctxData.tweetUrl   ? '' : 'none';
            div.style.display     = (_ctxData.fashionUrl && _ctxData.tweetUrl) ? '' : 'none';

            if (!_ctxData.fashionUrl && !_ctxData.tweetUrl) return;

            // position
            const vw = iw.innerWidth, vh = iw.innerHeight;
            const mw = 210, mh = 90;
            let x = e.clientX, y = e.clientY;
            if (x + mw > vw) x = vw - mw - 4;
            if (y + mh > vh) y = vh - mh - 4;

            menu.style.left = x + 'px';
            menu.style.top  = y + 'px';
            menu.style.display = 'flex';
          }, true);

          btnFash.addEventListener('click', e => {
            e.stopPropagation();
            if (_ctxData.fashionUrl) window.open(_ctxData.fashionUrl, '_blank', 'noopener,noreferrer');
            hideMenu();
          });
          btnX.addEventListener('click', e => {
            e.stopPropagation();
            if (_ctxData.tweetUrl) window.open(_ctxData.tweetUrl, '_blank', 'noopener,noreferrer');
            hideMenu();
          });

          idoc.addEventListener('click', hideMenu, true);
          idoc.addEventListener('keydown', e => { if (e.key === 'Escape') hideMenu(); });
          iw.addEventListener('blur', hideMenu);
        } catch(e) {}
      }
    } catch(e) {}

    loadingEl.classList.add('hidden');
    iframe.classList.add('loaded');

    const closeBtn = document.querySelector('.ww-6451');
    const minTop = 10;
    function updateCloseBtnTop() {
      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const scrollY = iframeDoc.documentElement.scrollTop || iframeDoc.body.scrollTop || 0;

        const iframeHeader = iframeDoc.querySelector('header');
        const headerH = iframeHeader ? iframeHeader.offsetHeight : 0;

        const newTop = Math.max(minTop, headerH - scrollY + minTop);
        closeBtn.style.top = newTop + 'px';
      } catch(e) {
        closeBtn.style.top = minTop + 'px';
      }
    }
    updateCloseBtnTop();
    try {
      const iframeWin = iframe.contentWindow;
      iframeWin.addEventListener('scroll', updateCloseBtnTop, { passive: true });
    } catch(e) {}
  };
  overlay.classList.add("open");

  overlay.className = 'open page-' + key;
  document.body.dataset.page = key;
}
function closePage() {
  document.getElementById("kawaii-3108").className = '';
  document.body.dataset.page = '';
  const iframe = document.getElementById("ruuko-4483");
  iframe.src = "about:blank";
  iframe.classList.remove('loaded');
  document.getElementById('nyann-6847').classList.remove('hidden');
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closePage();
});

// Auto-launch: ถ้ามี home page preference → เปิดเลย ไม่ผ่าน modal
document.addEventListener('DOMContentLoaded', function() {
  const home = _getHomePage();
  if (home) {
    openPage(home);
  } else {
    wlOpenModal();
  }
  _refreshHomeIcons();

  // Pixel-art tooltip สำหรับ .ruuko-home-toggle
  const tip = document.createElement('div');
  tip.className = 'px-tip';
  document.body.appendChild(tip);

  document.querySelectorAll('.ruuko-home-toggle').forEach(btn => {
    btn.addEventListener('mouseenter', function() {
      tip.textContent = this.dataset.tip || '';
      tip.style.opacity = '0';
      tip.style.display = 'block';
      const r = this.getBoundingClientRect();
      tip.style.left = (r.left + r.width / 2 - tip.offsetWidth / 2) + 'px';
      tip.style.top  = (r.top - tip.offsetHeight - 7) + 'px';
      tip.style.opacity = '1';
      tip.style.transform = 'translateY(0)';
    });
    btn.addEventListener('mouseleave', function() {
      tip.style.opacity = '0';
      tip.style.transform = 'translateY(4px)';
    });
  });
});
