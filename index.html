* { box-sizing: border-box; margin: 0; padding: 0; }
body {

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #c9a8ff, #ffb3d6);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #b78cff, #ff96c8);
}

header {
  padding: 20px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
header h1 {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.4);
}
.controls { display: flex; gap: 6px; align-items: center; }
.controls button {
  font-size: 11px;
  padding: 4px 13px;
  border-radius: 20px;
  border: 0.5px solid rgba(0,0,0,0.14);
  background: transparent;
  color: rgba(0,0,0,0.38);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.controls button:hover { color: #fff; border-color: rgba(0,0,0,0.35); }
.controls button.active {
  background: rgba(0,0,0,0.06);
  color: rgba(200,160,255,0.9);
  border-color: rgba(160,110,255,0.35);
}
#count {
  font-size: 11px;
  color: rgba(0,0,0,0.25);
  letter-spacing: 1px;
}

/* JS masonry container — position:relative, items are absolute */
#grid {
  position: relative;
  padding: 0 24px;
  margin-bottom: 80px;
}

.cell {
  position: absolute;
  width: 240px;          /* set by JS too */
  cursor: pointer;
  background: #e8e8e8;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
  will-change: transform;
}
.cell img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 10px;
  transition: filter 0.3s ease;
}
.cell:hover img { filter: saturate(1.1); }

.cell::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  pointer-events: none;
  z-index: 6;
  transition: opacity 0.35s ease;
}
.cell:hover { overflow: visible; z-index: 3; }
.cell:hover::after {
  opacity: 1;
  animation: softAnimeGlow 3.4s ease-in-out infinite;
}
@keyframes softAnimeGlow {
  0%, 100% {
    box-shadow:
      0 0 14px 3px rgba(255,255,255,0.6),
      0 0 32px 10px rgba(255,255,255,0.3),
      inset 0 0 18px rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.8);
  }
  50% {
    box-shadow:
      0 0 18px 5px rgba(255,255,255,0.75),
      0 0 38px 13px rgba(255,255,255,0.35),
      inset 0 0 18px rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.9);
  }
}
.cell .info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 22px 8px 7px;
  border-radius: 0 0 10px 10px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.22,1,0.36,1);
  display: flex; flex-direction: column; gap: 2px;
  line-height: 1.4;
}
.cell:hover .info { opacity: 1; transform: translateY(0); }
.info .date {
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6);
}
</style>

<script>
function parseJpDate(str) {
  const s = str.replace(/[+＋]/g, '');
  const m = s.match(/(\d{4})年(?:(\d{1,2})月(?:(\d{1,2})日)?)?/);
  if (!m) return 0;
  const y = parseInt(m[1], 10);
  const mo = m[2] ? parseInt(m[2], 10) : 1;
  const d  = m[3] ? parseInt(m[3], 10) : 1;
  return y * 10000 + mo * 100 + d;
}

  { url: "https://pbs.twimg.com/media/EdauhmjU0AAeQ-I.png", tweet: "https://x.com/ruuko514/status/1288171561879351297", date: "2020年" },
  { url: "https://pbs.twimg.com/media/EALX6KcUYAA7mNp.jpg", tweet: "https://x.com/ruuko514/status/1288171561879351297", date: "2019年7月23日" },
  { url: "https://pbs.twimg.com/media/EALX6KkU8AATjZi.jpg", tweet: "https://x.com/ruuko514/status/1288171561879351297", date: "2019年7月23日" },
  { url: "https://pbs.twimg.com/media/EALX6LPUcAUIuQn.jpg", tweet: "https://x.com/ruuko514/status/1288171561879351297", date: "2019年7月23日" },
  { url: "https://pbs.twimg.com/media/D_5DorRUYAA8muT.jpg", tweet: "https://x.com/ruuko514/status/1288171561879351297", date: "2019年" },
  { url: "https://pbs.twimg.com/media/D_5DorZUIAAQLkN.jpg", tweet: "https://x.com/ruuko514/status/1288171561879351297", date: "2019年" }
];

items.forEach(item => { item.ts = parseJpDate(item.date); });

const GAP = 4;
const COL_W = 240;
let mode = 'new';
let pendingLayout = false;

// imageHeightCache: url -> natural height at COL_W width
const heightCache = {};

function sort(m) {
  mode = m;
  ['new','old'].forEach(k => {
    document.getElementById('btn-'+k).className = m === k ? 'active' : '';
  });
  render();
}

function getColCount() {
  const gridW = document.getElementById('grid').clientWidth - 48; // minus padding
  return Math.max(1, Math.floor((gridW + GAP) / (COL_W + GAP)));
}

// Layout pass: place cells left-to-right by index, shortest-column masonry
function layoutCells(cells) {
  const cols = getColCount();
  const colHeights = new Array(cols).fill(0);
  const gridW = document.getElementById('grid').clientWidth - 48;
  const totalGap = GAP * (cols - 1);
  const colW = Math.floor((gridW - totalGap) / cols);

  cells.forEach((cell, i) => {
    // find shortest column
    const col = colHeights.indexOf(Math.min(...colHeights));
    const x = col * (colW + GAP);
    const y = colHeights[col];

    cell.style.width = colW + 'px';
    cell.style.left = x + 'px';
    cell.style.top  = y + 'px';

    const imgEl = cell.querySelector('img');
    const naturalH = heightCache[imgEl.src];
    const h = naturalH ? Math.round(naturalH * colW / (imgEl.naturalWidth || colW)) : colW; // fallback square
    colHeights[col] += h + GAP;
  });

  const maxH = Math.max(...colHeights);
  document.getElementById('grid').style.height = (maxH + 80) + 'px';
}

function render() {
  const sorted = [...items].sort((a, b) =>
    mode === 'old' ? a.ts - b.ts : b.ts - a.ts
  );

  document.getElementById('count').textContent = sorted.length + ' 枚';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const cells = [];

  sorted.forEach(item => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = item.url;

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = '<span class="date">' + item.date + '</span>';

    cell.appendChild(img);
    cell.appendChild(info);

    cell.addEventListener('click', () => window.open(item.tweet, '_blank'));
    cell.addEventListener('mousemove', (e) => {
      const rect = cell.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;
      cell.style.transform =
        'perspective(700px) rotateX(' + ((0.5 - py) * 16).toFixed(2) + 'deg) rotateY(' + ((px - 0.5) * 16).toFixed(2) + 'deg) scale(1.04) translateY(-3px)';
      cell.style.boxShadow = '0 14px 28px rgba(0,0,0,0.18)';
    });
    cell.addEventListener('mouseleave', () => {
      cell.style.transform = '';
      cell.style.boxShadow = '';
    });

    // When image loads, cache its aspect ratio and re-layout
    img.addEventListener('load', () => {
      heightCache[img.src] = img.naturalHeight;
      scheduleLayout(cells);
    });
    img.addEventListener('error', () => { cell.style.display = 'none'; });

    grid.appendChild(cell);
    cells.push(cell);
  });

  // Initial layout before images load (placeholder heights)
  layoutCells(cells);
}

function scheduleLayout(cells) {
  if (pendingLayout) return;
  pendingLayout = true;
  requestAnimationFrame(() => {
    pendingLayout = false;
    layoutCells(cells);
  });
}

render();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(), 120);
});
</script>
