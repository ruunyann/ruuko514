* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #fff;

  color: #111;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;

html {
  scrollbar-gutter: stable;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #c9a8ff, #ffb3d6);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #b78cff, #ff96c8);
}

header {
  padding: 20px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
header h1 {
  font-family: 'Comfortaa', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 1px;
  color: rgba(0,0,0,0.4);
  cursor: pointer;
  text-decoration: none;
  transition: color 0.2s;
}
header h1:hover { color: rgba(0,0,0,0.7); }
.x-link {
  display: flex;
  align-items: center;
  opacity: 0.3;
  transition: opacity 0.2s;
  text-decoration: none;
}
.x-link:hover { opacity: 0.75; }
.x-icon {
  width: 14px;
  height: 14px;

}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
}
.dots {
  font-size: 14px;
  color: rgba(0,0,0,0.22);
  letter-spacing: 2px;
  cursor: default;
  user-select: none;
}
.controls {
  display: flex;
  gap: 6px;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.header-left:hover .controls {
  opacity: 1;
  pointer-events: auto;
}
.controls button {
  font-size: 11px;
  padding: 4px 13px;
  border-radius: 20px;
  border: 0.5px solid rgba(0,0,0,0.14);
  background: transparent;
  color: rgba(0,0,0,0.38);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.controls button:hover { color: rgba(0,0,0,0.7); border-color: rgba(0,0,0,0.35); }
.controls button.active {
  background: rgba(0,0,0,0.06);
  color: rgba(200,160,255,0.9);
  border-color: rgba(160,110,255,0.35);
}
#count {
  font-size: 11px;
  color: rgba(0,0,0,0.25);
  letter-spacing: 1px;
}

#grid-wrap {
  position: relative;
}
#grid {
  position: relative;
  margin-bottom: 80px;
}

.cell {
  position: absolute;
  width: 270px;
  cursor: pointer;
  background: #e8e8e8;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
  will-change: transform;
}
.cell img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 10px;
  transition: filter 0.3s ease;
  -webkit-user-drag: none;
  user-drag: none;
  pointer-events: none;
}
.cell:hover img { filter: saturate(1.1); }

.cell::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  pointer-events: none;
  z-index: 6;
  transition: opacity 0.35s ease;
}
.cell:hover { overflow: visible; z-index: 3; }
.cell:hover::after {
  opacity: 1;
  animation: softAnimeGlow 3.4s ease-in-out infinite;
}
@keyframes softAnimeGlow {
  0%, 100% {
    box-shadow:
      0 0 12px 3px rgba(255,255,255,0.45),
      0 0 28px 8px rgba(255,255,255,0.2),
      inset 0 0 14px rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.6);
  }
  50% {
    box-shadow:
      0 0 16px 5px rgba(255,255,255,0.55),
      0 0 36px 12px rgba(255,255,255,0.25),
      inset 0 0 16px rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.75);
  }
}
.cell .info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 22px 8px 7px;
  border-radius: 0 0 10px 10px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.22,1,0.36,1);
  display: flex; flex-direction: column; gap: 2px;
  line-height: 1.4;
}
.cell:hover .info { opacity: 1; transform: translateY(0); }
.info .date {
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6);
}

function parseJpDate(str) {
  const s = str.replace(/[+＋]/g, '');
  const m = s.match(/(\d{4})年(?:(\d{1,2})月(?:(\d{1,2})日)?)?/);
  if (!m) return 0;
  const y = parseInt(m[1], 10);
  const mo = m[2] ? parseInt(m[2], 10) : 1;
  const d  = m[3] ? parseInt(m[3], 10) : 1;
  return y * 10000 + mo * 100 + d;
}

items.forEach(item => { item.ts = parseJpDate(item.date); });

const GAP = 4;
const COL_W = 270;
let mode = 'new';
let pendingLayout = false;

const heightCache = {};

function sort(m) {
  mode = m;
  ['new','old'].forEach(k => {
    document.getElementById('btn-'+k).className = m === k ? 'active' : '';
  });
  render();
}

function getColCount() {
  const gridW = document.getElementById('grid').clientWidth - 80;
  return Math.max(1, Math.floor((gridW + GAP) / (COL_W + GAP)));
}

function layoutCells(cells) {
  const cols = getColCount();
  const colHeights = new Array(cols).fill(0);
  const gridW = document.getElementById('grid').clientWidth - 80;
  const totalGap = GAP * (cols - 1);
  const colW = Math.floor((gridW - totalGap) / cols);
  const blockW = colW * cols + GAP * (cols - 1);
  const offsetX = Math.floor((document.getElementById('grid').clientWidth - blockW) / 2);

  cells.forEach((cell) => {
    const imgEl = cell.querySelector('img');
    const nw = imgEl.naturalWidth  || 0;
    const nh = imgEl.naturalHeight || 0;
    const isLandscape = nw > 0 && nh > 0 && nw > nh;
    const span = (isLandscape && cols >= 2) ? 2 : 1;

    let col = 0;
    if (span === 1) {
      col = colHeights.indexOf(Math.min(...colHeights));
    } else {
      let best = Infinity;
      for (let c = 0; c <= cols - 2; c++) {
        const top = Math.max(colHeights[c], colHeights[c + 1]);
        if (top < best) { best = top; col = c; }
      }
    }

    const cellW = span === 2 ? colW * 2 + GAP : colW;
    const x = offsetX + col * (colW + GAP);
    const y = span === 2
      ? Math.max(colHeights[col], colHeights[col + 1])
      : colHeights[col];

    cell.style.width = cellW + 'px';
    cell.style.left  = x + 'px';
    cell.style.top   = y + 'px';

    const h = nw > 0 ? Math.round(nh * cellW / nw) : cellW;

    if (span === 2) {
      colHeights[col]     = y + h + GAP;
      colHeights[col + 1] = y + h + GAP;
    } else {
      colHeights[col] = y + h + GAP;
    }
  });

  const maxH = Math.max(...colHeights);
  document.getElementById('grid').style.height = (maxH + 80) + 'px';
}

function render() {
  const sorted = [...items].filter(item => !item.hidden).sort((a, b) =>
    mode === 'old' ? a.ts - b.ts : b.ts - a.ts
  );

  document.getElementById('count').textContent = sorted.length + ' 枚';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const cells = [];

  sorted.forEach(item => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = item.url;
    img.draggable = false;
    img.addEventListener('dragstart', e => e.preventDefault());

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = '';

    cell.appendChild(img);
    cell.appendChild(info);

    cell.addEventListener('mousemove', (e) => {
      const rect = cell.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;
      cell.style.transform =
        'perspective(700px) rotateX(' + ((0.5 - py) * 16).toFixed(2) + 'deg) rotateY(' + ((px - 0.5) * 16).toFixed(2) + 'deg) scale(1.07) translateY(-3px)';
      cell.style.boxShadow = '0 14px 28px rgba(0,0,0,0.18)';
    });
    cell.addEventListener('mouseleave', () => {
      cell.style.transform = '';
      cell.style.boxShadow = '';
    });

    img.addEventListener('load', () => {
      heightCache[img.src] = img.naturalHeight;
      scheduleLayout(cells);
    });
    img.addEventListener('error', () => { cell.style.display = 'none'; });

    grid.appendChild(cell);
    cells.push(cell);
  });

  layoutCells(cells);
}

function scheduleLayout(cells) {
  if (pendingLayout) return;
  pendingLayout = true;
  requestAnimationFrame(() => {
    pendingLayout = false;
    layoutCells(cells);
  });
}

render();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(), 120);
});

document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (e.key === 'F12') { e.preventDefault(); return false; }
  if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return false; }
  if (e.ctrlKey && (k === 'u' || k === 's')) { e.preventDefault(); return false; }
});

(function () {
  const THRESHOLD = 160;
  const overlay = document.createElement('div');
  overlay.id = 'devtools-block';
  overlay.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:99999;display:none;align-items:center;justify-content:center;text-align:center;font-size:14px;color:rgba(0,0,0,0.5);padding:20px;';
  overlay.textContent = '画面の表示にはDevToolsを閉じてください';
  document.body.appendChild(overlay);

  function checkDevTools() {
    const widthDiff = window.outerWidth - window.innerWidth;
    const heightDiff = window.outerHeight - window.innerHeight;
    const open = widthDiff > THRESHOLD || heightDiff > THRESHOLD;
    overlay.style.display = open ? 'flex' : 'none';
  }
  setInterval(checkDevTools, 800);
})();

document.addEventListener('mousedown', e => {
  if (e.button !== 2 && e.button !== 0) return;
  spawnHearts(e.clientX, e.clientY);
});

function spawnHearts(x, y) {
  const count = 8 + Math.floor(Math.random() * 5);
  const colors = ['#ff6eb4','#ff9fd6','#ffb3e0','#ff4da6','#c96fff','#ff85c8','#ffcce8','#e066ff'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
    const dist = 60 + Math.random() * 80;
    const size = 14 + Math.random() * 14;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dur = 600 + Math.random() * 400;
    el.textContent = '♡';
    Object.assign(el.style, {
      position: 'fixed',
      left: x + 'px',
      top: y + 'px',
      fontSize: size + 'px',
      color: color,
      pointerEvents: 'none',
      zIndex: 9999,
      transform: 'translate(-50%,-50%)',
      textShadow: '0 0 6px ' + color,
      transition: `transform ${dur}ms cubic-bezier(0.2,1,0.4,1), opacity ${dur}ms ease`,
      opacity: '1',
    });
    document.body.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0.3)`;
      el.style.opacity = '0';
    }));
    setTimeout(() => el.remove(), dur + 50);
  }
}
